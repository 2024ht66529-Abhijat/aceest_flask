<!DOCTYPE html>
<html>
<head>
    <title>ACEest Fitness v3.2.5</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="window">
  <div class="titlebar">ACEest Fitness & Gym</div>
  <div class="content">
    <form method="post">
      <label>Select Training Program</label>
      <select name="program">
      {% for p in programs %}<option>{{p}}</option>{% endfor %}
      </select>
      <button type="submit">Apply</button>
    </form>
    {% if selected %}
    <div class="result">{{selected.desc}}</div>
    {% endif %}
  </div>
</div>
</body>
</html>
